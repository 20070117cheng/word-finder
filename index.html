<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>單字查找器</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --ink: #1e2433;
    --sub: #6b7386;
    --accent: #3b6ef5;
    --chip: #eef2ff;
    --chip-ink: #2d4bc0;
    --border: #e2e6f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12151d;
      --card: #1c2130;
      --ink: #e8ebf4;
      --sub: #98a0b4;
      --accent: #6c92ff;
      --chip: #263050;
      --chip-ink: #b9c8ff;
      --border: #2c3346;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 16px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 4px 0 2px; }
  .hint { color: var(--sub); font-size: 13px; margin: 0 0 14px; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .field { flex: 1; }
  .field label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .field input {
    width: 100%;
    font-size: 22px;
    text-align: center;
    padding: 10px 6px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    text-transform: lowercase;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .arrow { font-size: 20px; color: var(--sub); padding-bottom: 14px; }
  .count { margin: 14px 2px 8px; font-size: 14px; color: var(--sub); }
  .count b { color: var(--accent); font-size: 16px; }
  .len-title {
    font-size: 13px;
    color: var(--sub);
    margin: 14px 2px 6px;
    font-weight: 600;
  }
  .grid { display: flex; flex-direction: column; gap: 6px; }
  .row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .row .w {
    font-weight: 600;
    color: var(--chip-ink);
    font-size: 17px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .row .t {
    color: var(--sub);
    font-size: 13px;
    flex: 1;
    line-height: 1.45;
  }
  .more {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
  }
  .empty { color: var(--sub); text-align: center; padding: 40px 0; font-size: 15px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>單字查找器</h1>
  <p class="hint">輸入開頭與結尾字母，自動排除 -ed／-ing 動詞變化與複數形</p>
  <div class="panel">
    <div class="field">
      <label>開頭字母</label>
      <input id="first" type="text" inputmode="latin" autocapitalize="none" autocomplete="off" placeholder="a">
    </div>
    <div class="arrow">➜</div>
    <div class="field">
      <label>結尾字母</label>
      <input id="last" type="text" inputmode="latin" autocapitalize="none" autocomplete="off" placeholder="e">
    </div>
  </div>
  <div class="count" id="count"></div>
  <div id="results"></div>
  <button class="more" id="more" style="display:none">顯示更多</button>
</div>

<script>
(function () {
  // 每行格式：單字<TAB>中文翻譯
  const ENTRIES = document.getElementById('words').textContent.trim().split('\n').map(function (l) {
    const i = l.indexOf('\t');
    return i < 0 ? [l, ''] : [l.slice(0, i), l.slice(i + 1)];
  });
  const DICT = new Set(ENTRIES.map(e => e[0]));

  // 少數合法但會被規則誤殺的常用字
  const KEEP = new Set(['news', 'clothes', 'morning', 'evening', 'wicked',
    'thing', 'being', 'nothing', 'anything', 'everything', 'something',
    'lightning', 'offspring', 'plaything', 'drawstring', 'hamstring', 'thanksgiving',
    'shed', 'hundred', 'hatred', 'sacred', 'kindred', 'infrared', 'newlywed', 'premed',
    'deathbed', 'flatbed', 'hotbed', 'waterbed', 'seabed', 'riverbed',
    'woodshed', 'bloodshed', 'watershed']);

  function isDerived(w) {
    if (KEEP.has(w)) return false;

    // -ing 動名詞／現在分詞：walking→walk、making→make、running→run
    if (w.endsWith('ing') && w.length > 4) {
      const s = w.slice(0, -3);
      if (DICT.has(s) || DICT.has(s + 'e')) return true;
      if (s.length > 2 && s[s.length - 1] === s[s.length - 2] && DICT.has(s.slice(0, -1))) return true;
      // 長字幾乎都是分詞形（-ling 結尾的名詞如 sibling 除外）
      if (w.length >= 8 && !w.endsWith('ling')) return true;
    }

    // -ed 過去式／分詞：walked→walk、liked→like、stopped→stop、tried→try
    // eed 結尾（need、feed、speed）不套用此規則
    if (w.endsWith('ed') && w.length > 3 && !w.endsWith('eed')) {
      // 6 個字母以上的 ed 結尾幾乎都是分詞形（複合字如 waterbed 已列入白名單）
      if (w.length >= 6) return true;
      const s = w.slice(0, -2);
      if (DICT.has(s) || DICT.has(w.slice(0, -1))) return true;
      if (s.length > 2 && s[s.length - 1] === s[s.length - 2] && DICT.has(s.slice(0, -1))) return true;
      if (w.endsWith('ied') && DICT.has(w.slice(0, -3) + 'y')) return true;
    }

    // 複數：cats→cat、boxes→box、cities→city
    // ss / us / is 結尾（class、bonus、tennis）不套用
    if (w.endsWith('s') && !w.endsWith('ss') && !w.endsWith('us') && !w.endsWith('is')) {
      if (w.endsWith('ies') && w.length > 4 && DICT.has(w.slice(0, -3) + 'y')) return true;
      if (w.endsWith('ves') && (DICT.has(w.slice(0, -3) + 'f') || DICT.has(w.slice(0, -3) + 'fe'))) return true; // knives→knife、wolves→wolf
      if (w.endsWith('es') && DICT.has(w.slice(0, -2))) return true;
      const s = w.slice(0, -1);
      if (s.length >= 3 && DICT.has(s)) return true;
    }

    return false;
  }

  const PAGE = 120;
  let matched = [];
  let shown = 0;

  const $first = document.getElementById('first');
  const $last = document.getElementById('last');
  const $count = document.getElementById('count');
  const $results = document.getElementById('results');
  const $more = document.getElementById('more');

  function search() {
    const a = $first.value.trim().toLowerCase().replace(/[^a-z]/g, '');
    const b = $last.value.trim().toLowerCase().replace(/[^a-z]/g, '');
    $results.innerHTML = '';
    $more.style.display = 'none';
    shown = 0;
    matched = [];

    if (!a && !b) { $count.textContent = ''; return; }

    for (const e of ENTRIES) {
      const w = e[0];
      if (a && !w.startsWith(a)) continue;
      if (b && !w.endsWith(b)) continue;
      if (isDerived(w)) continue;
      matched.push(e);
    }
    matched.sort((x, y) => x[0].length - y[0].length || (x[0] < y[0] ? -1 : 1));

    if (!matched.length) {
      $count.textContent = '';
      $results.innerHTML = '<div class="empty">找不到符合的單字</div>';
      return;
    }
    $count.innerHTML = '共 <b>' + matched.length + '</b> 個單字';
    renderMore();
  }

  function renderMore() {
    const slice = matched.slice(shown, shown + PAGE);
    let lastLen = shown > 0 ? matched[shown - 1][0].length : 0;
    const frag = document.createDocumentFragment();
    let grid = shown > 0 ? $results.lastElementChild : null;

    for (const e of slice) {
      if (e[0].length !== lastLen) {
        lastLen = e[0].length;
        const t = document.createElement('div');
        t.className = 'len-title';
        t.textContent = lastLen + ' 個字母';
        frag.appendChild(t);
        grid = document.createElement('div');
        grid.className = 'grid';
        frag.appendChild(grid);
      }
      const row = document.createElement('div');
      row.className = 'row';
      const w = document.createElement('span');
      w.className = 'w';
      w.textContent = e[0];
      const t = document.createElement('span');
      t.className = 't';
      t.textContent = e[1];
      row.appendChild(w);
      row.appendChild(t);
      grid.appendChild(row);
    }
    $results.appendChild(frag);
    shown += slice.length;
    $more.style.display = shown < matched.length ? 'block' : 'none';
    if (shown < matched.length) $more.textContent = '顯示更多（還有 ' + (matched.length - shown) + ' 個）';
  }

  $more.addEventListener('click', renderMore);
  $first.addEventListener('input', search);
  $last.addEventListener('input', search);
})();
</script>
